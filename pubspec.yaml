name: rox_proxy
description: "RoxProxy — HTTP/HTTPS intercepting proxy for macOS."
publish_to: 'none'

version: 0.0.5+5

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # Local native plugin (Swift bridge)
  rox_proxy_native:
    path: packages/rox_proxy_native

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # JSON + UUID
  uuid: ^4.5.1

  # Path for Application Support directory
  path_provider: ^2.1.5
  mockito: ^5.4.6
  build_runner: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
